<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100">
  <!--
    Cashew kernel base path (local coords, tail at left):
    M-30,0 → left tail tip
    Upper arch → top-right side
    Inner concave → back to tail
  -->

  <!-- Kernel 1: back-left, angled ~38° -->
  <g transform="translate(32,62) rotate(38) scale(0.82)">
    <path d="M-30,0 C-31,-9 -14,-13 4,-13 C18,-13 31,-8 33,-1 C34,5 26,11 10,12 C-4,13 -20,10 -27,5 C-30,3 -30,1 -30,0Z"
          fill="#E0CC80" stroke="#7A4215" stroke-width="2.6" stroke-linejoin="round"/>
    <!-- Highlight -->
    <path d="M-26,-4 C-18,-10 -4,-12 9,-11"
          fill="none" stroke="#FFF6CC" stroke-width="2.8" stroke-linecap="round" opacity="0.7"/>
    <!-- Inner crease -->
    <path d="M-27,5 C-20,1 -13,-2 -6,-3"
          fill="none" stroke="#9B5A1A" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- Kernel 2: center/main (largest, front) -->
  <g transform="translate(57,53) rotate(-8)">
    <path d="M-30,0 C-31,-9 -14,-13 4,-13 C18,-13 31,-8 33,-1 C34,5 26,11 10,12 C-4,13 -20,10 -27,5 C-30,3 -30,1 -30,0Z"
          fill="#F0DFA0" stroke="#7A4215" stroke-width="2.6" stroke-linejoin="round"/>
    <!-- Highlight -->
    <path d="M-26,-4 C-18,-10 -4,-12 9,-11"
          fill="none" stroke="#FFF8D8" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <!-- Inner crease -->
    <path d="M-27,5 C-20,1 -13,-2 -6,-3"
          fill="none" stroke="#9B5A1A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Lower body tone -->
    <path d="M 6,12 C 0,13 -8,13 -16,11"
          fill="none" stroke="#C8A040" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- Kernel 3: front-right, steeper angle -->
  <g transform="translate(92,40) rotate(-42) scale(0.72)">
    <path d="M-30,0 C-31,-9 -14,-13 4,-13 C18,-13 31,-8 33,-1 C34,5 26,11 10,12 C-4,13 -20,10 -27,5 C-30,3 -30,1 -30,0Z"
          fill="#F0DFA0" stroke="#7A4215" stroke-width="2.6" stroke-linejoin="round"/>
    <!-- Highlight -->
    <path d="M-26,-4 C-18,-10 -4,-12 9,-11"
          fill="none" stroke="#FFF8D8" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <!-- Inner crease -->
    <path d="M-27,5 C-20,1 -13,-2 -6,-3"
          fill="none" stroke="#9B5A1A" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>
  </g>
</svg>
